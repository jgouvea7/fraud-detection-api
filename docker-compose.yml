services:
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
      - api02
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "50MB"

  api01:
    build: ./backend
    platform: linux/amd64
    expose:
      - "9999"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  api02:
    build: ./backend
    platform: linux/amd64
    expose:
      - "9999"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"