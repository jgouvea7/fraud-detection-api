version: '3.8'

services:
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
      - api02
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "50MB"
    networks:
      - rinha-network

  api01:
    image: aegdae/rinha-api-2026:v3
    platform: linux/amd64
    hostname: api01
    environment:
      - PORT=9999
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"
    networks:
      - rinha-network

  api02:
    image: aegdae/rinha-api-2026:v3
    platform: linux/amd64
    hostname: api02
    environment:
      - PORT=9999
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"
    networks:
      - rinha-network

networks:
  rinha-network:
    driver: bridge
